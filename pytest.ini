[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    -q
    --ignore=tests/test_audit_performance.py
    --ignore=tests/test_performance.py
    --ignore=tests/test_clipboard_memory.py
    --cov=src
    --cov-fail-under=80
    --cov-report=term-missing
    --cov-report=html:tests/report/coverage_html
